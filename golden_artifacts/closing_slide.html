<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #1e2a1e;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .title {
    color: #ffffff;
    font-size: 72px;
    font-weight: 700;
    margin-bottom: 60px;
    letter-spacing: -0.02em;
  }
  .metrics {
    display: flex;
    gap: 40px;
    margin-bottom: 50px;
  }
  .metric-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 36px 48px;
    text-align: center;
    min-width: 220px;
  }
  .metric-value {
    color: #52b788;
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .metric-label {
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    font-weight: 400;
  }
  .divider {
    width: 800px;
    height: 1px;
    background: rgba(255,255,255,0.15);
    margin-bottom: 36px;
  }
  .tagline {
    color: rgba(255,255,255,0.6);
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 60px;
    letter-spacing: 0.02em;
  }
  .footer {
    text-align: center;
  }
  .footer-link {
    color: rgba(255,255,255,0.45);
    font-size: 16px;
    margin-bottom: 6px;
  }
  .footer-name {
    color: rgba(255,255,255,0.35);
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="title">CHW Copilot</div>
  
  <div class="metrics">
    <div class="metric-card">
      <div class="metric-value">bfloat16</div>
      <div class="metric-label">8GB VRAM on T4</div>
    </div>
    <div class="metric-card">
      <div class="metric-value">~26s</div>
      <div class="metric-label">Per Note</div>
    </div>
    <div class="metric-card">
      <div class="metric-value">85%</div>
      <div class="metric-label">Syndrome Accuracy</div>
    </div>
    <div class="metric-card">
      <div class="metric-value">100%</div>
      <div class="metric-label">Evidence Grounding</div>
    </div>
  </div>
  
  <div class="divider"></div>
  
  <div class="tagline">6-agent pipeline · Keyword fallbacks · 60 gold-standard encounters evaluated</div>
  
  <div class="footer">
    <div class="footer-link">github.com/KheziaNtomo/chw-copilot</div>
    <div class="footer-name">Khezia Asamoah · MedGemma Impact Challenge</div>
  </div>
</body>
</html>
